name: TaskManager CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Lint with Spotless
      run: mvn spotless:check
      
    - name: Build with Maven
      run: mvn -B package --file pom.xml -DskipTests

    - name: Run Unit Tests and Generate Coverage
      run: mvn -B test jacoco:report

    - name: SonarQube Scan
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn -B verify sonar:sonar -Dsonar.projectKey=bc03_ec01_TaskManager -Dsonar.host.url=https://sonarcloud.io

  security-scans:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v4
    
    - name: Dependency Check
      run: mvn org.owasp:dependency-check-maven:check
      
    - name: Run Trivy vulnerability scanner (Filesystem)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

  docker-build-push:
    runs-on: ubuntu-latest
    needs: security-scans
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-api:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
    - name: Deploy to Server via SSH
      run: |
        echo "Industrializing deployment for startup DeployFast..."
        echo "Updating images and restarting containers on production server..."
        # In a real scenario:
        # ssh user@server "docker-compose pull && docker-compose up -d"
