# Common Properties
spring.application.name=TaskManager
spring.main.banner-mode=off

# JWT Properties
taskmanager.app.jwtSecret=secretKeyWithAtLeast32CharactersNeededForSecurityPurposes
taskmanager.app.jwtExpirationMs=86400000

server.port=8080

# OpenAPI Swagger Properties
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Data Source - H2 (Default for local development and testing)
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

